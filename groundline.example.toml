# Groundline provider configuration.
# Copy this file to groundline.toml for local use. Keep real API keys in
# environment variables rather than committing them to the repository.

[llm]
provider = "openai_compatible"
model = ""
base_url = ""
endpoint_path = ""
api_key_env = "GROUNDLINE_LLM_API_KEY"
timeout_seconds = 60

[embedding]
provider = "none"
model = "sentence-transformers/all-MiniLM-L6-v2"
base_url = ""
endpoint_path = ""
api_key_env = "GROUNDLINE_EMBEDDING_API_KEY"
dimension = 384
timeout_seconds = 60

[rerank]
provider = "none"
model = ""
base_url = ""
endpoint_path = ""
api_key_env = "GROUNDLINE_RERANK_API_KEY"
timeout_seconds = 60
